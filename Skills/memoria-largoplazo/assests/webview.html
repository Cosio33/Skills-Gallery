<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoria de Largo Plazo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 16px;
            min-height: 100vh;
        }
        
        .container { 
            max-width: 100%; 
            margin: 0 auto; 
        }
        
        h2 { 
            color: #00d4ff; 
            margin-bottom: 16px; 
            font-size: 18px; 
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .search-box {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #0f3460;
            border-radius: 8px;
            background: #16213e;
            color: white;
            margin-bottom: 12px;
            font-size: 14px;
        }
        
        .stats {
            text-align: center;
            color: #888;
            margin-bottom: 12px;
            font-size: 12px;
        }
        
        .memory-card {
            background: #16213e;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #00d4ff;
        }
        
        .memory-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        
        .category {
            background: #0f3460;
            color: #00d4ff;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            text-transform: uppercase;
        }
        
        .date { 
            color: #666; 
            font-size: 10px; 
        }
        
        .content { 
            color: #fff; 
            line-height: 1.4; 
            margin-bottom: 6px;
            font-size: 14px;
            word-wrap: break-word;
        }
        
        .tags { 
            display: flex; 
            gap: 4px; 
            flex-wrap: wrap; 
            margin-bottom: 6px;
        }
        
        .tag {
            background: #e94560;
            color: white;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 10px;
        }
        
        .card-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }
        
        .btn-small {
            background: transparent;
            color: #00d4ff;
            border: 1px solid #00d4ff;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            flex: 1;
        }
        
        .btn-small:hover { 
            background: #00d4ff; 
            color: #1a1a2e; 
        }
        
        .btn-small.delete {
            color: #e94560;
            border-color: #e94560;
        }
        
        .btn-small.delete:hover {
            background: #e94560;
            color: white;
        }
        
        .empty-state {
            text-align: center;
            padding: 30px;
            color: #888;
        }
        
        .empty-state p {
            margin-bottom: 8px;
        }
        
        .fab {
            position: fixed;
            bottom: 16px;
            right: 16px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #00d4ff;
            color: #1a1a2e;
            border: none;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0,212,255,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        
        .modal.active { display: flex; }
        
        .modal-content {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal h3 { 
            color: #00d4ff; 
            margin-bottom: 16px;
            font-size: 16px;
        }
        
        .input-group { 
            margin-bottom: 12px; 
        }
        
        .input-group label { 
            display: block; 
            color: #888; 
            margin-bottom: 4px; 
            font-size: 12px; 
        }
        
        .input-group input, 
        .input-group textarea, 
        .input-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #0f3460;
            border-radius: 6px;
            background: #1a1a2e;
            color: white;
            font-size: 14px;
        }
        
        .input-group textarea { 
            min-height: 80px; 
            resize: vertical; 
        }
        
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 16px;
        }
        
        .btn {
            padding: 10px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        
        .btn-primary { 
            background: #00d4ff; 
            color: #1a1a2e; 
        }
        
        .btn-secondary { 
            background: #0f3460; 
            color: #00d4ff; 
        }
        
        .export-btn {
            width: 100%;
            padding: 10px;
            background: #0f3460;
            color: #00d4ff;
            border: 1px solid #00d4ff;
            border-radius: 6px;
            margin-bottom: 12px;
            cursor: pointer;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🧠 Mi Memoria</h2>
        
        <button class="export-btn" onclick="exportMemories()">📤 Exportar Memorias</button>
        
        <input type="text" class="search-box" id="searchInput" placeholder="🔍 Buscar recuerdos...">
        
        <div class="stats" id="stats">Cargando...</div>
        
        <div id="memoriesList"></div>
    </div>

    <button class="fab" onclick="openModal()">+</button>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 id="modalTitle">📝 Nueva Memoria</h3>
            
            <div class="input-group">
                <label>Contenido *</label>
                <textarea id="memoryContent" placeholder="¿Qué quieres recordar?"></textarea>
            </div>
            
            <div class="input-group">
                <label>Categoría</label>
                <select id="memoryCategory">
                    <option value="general">General</option>
                    <option value="preferencias">Preferencias</option>
                    <option value="proyectos">Proyectos</option>
                    <option value="recordatorios">Recordatorios</option>
                    <option value="personales">Personales</option>
                    <option value="trabajo">Trabajo</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>Etiquetas (separadas por coma)</label>
                <input type="text" id="memoryTags" placeholder="importante, idea, seguimiento">
            </div>
            
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="saveMemory()">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'ai_edge_gallery_long_term_memory';
        let editingId = null;

        function getMemories() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                return data ? JSON.parse(data) : [];
            } catch (e) { 
                return []; 
            }
        }

        function saveMemories(memories) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(memories));
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function formatDate(isoString) {
            const date = new Date(isoString);
            return date.toLocaleDateString('es-ES', { 
                day: '2-digit', month: 'short',
                hour: '2-digit', minute: '2-digit'
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderMemories(memories = getMemories()) {
            const container = document.getElementById('memoriesList');
            const stats = document.getElementById('stats');
            
            stats.textContent = `${memories.length} recuerdo${memories.length !== 1 ? 's' : ''}`;

            if (memories.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>📝 No hay memorias guardadas</p>
                        <p style="font-size: 12px; margin-top: 8px;">
                            Presiona + para agregar tu primera memoria
                        </p>
                    </div>
                `;
                return;
            }

            container.innerHTML = memories.map(m => `
                <div class="memory-card">
                    <div class="memory-header">
                        <span class="category">${m.category}</span>
                        <span class="date">${formatDate(m.createdAt)}</span>
                    </div>
                    <div class="content">${escapeHtml(m.content)}</div>
                    ${m.tags.length ? `
                        <div class="tags">
                            ${m.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
                        </div>
                    ` : ''}
                    <div class="card-actions">
                        <button class="btn-small" onclick="editMemory('${m.id}')">✏️ Editar</button>
                        <button class="btn-small" onclick="copyMemory('${m.id}')">📋 Copiar</button>
                        <button class="btn-small delete" onclick="deleteMemory('${m.id}')">🗑️ Borrar</button>
                    </div>
                </div>
            `).join('');
        }

        function searchMemories(query) {
            const memories = getMemories();
            if (!query.trim()) return memories;
            
            const lowerQuery = query.toLowerCase();
            return memories.filter(m => 
                m.content.toLowerCase().includes(lowerQuery) ||
                m.category.toLowerCase().includes(lowerQuery) ||
                m.tags.some(t => t.toLowerCase().includes(lowerQuery))
            );
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderMemories(searchMemories(e.target.value));
        });

        function openModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = '📝 Nueva Memoria';
            document.getElementById('memoryContent').value = '';
            document.getElementById('memoryCategory').value = 'general';
            document.getElementById('memoryTags').value = '';
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function saveMemory() {
            const content = document.getElementById('memoryContent').value.trim();
            const category = document.getElementById('memoryCategory').value;
            const tagsStr = document.getElementById('memoryTags').value;
            
            if (!content) {
                alert('Escribe algo para recordar');
                return;
            }

            const tags = tagsStr.split(',').map(t => t.trim()).filter(t => t);
            const memories = getMemories();

            if (editingId) {
                const index = memories.findIndex(m => m.id === editingId);
                if (index !== -1) {
                    memories[index] = {
                        ...memories[index],
                        content,
                        category,
                        tags,
                        updatedAt: new Date().toISOString()
                    };
                }
            } else {
                memories.unshift({
                    id: generateId(),
                    content,
                    category,
                    tags,
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                });
            }

            saveMemories(memories);
            closeModal();
            renderMemories();
        }

        function editMemory(id) {
            const memory = getMemories().find(m => m.id === id);
            if (!memory) return;

            editingId = id;
            document.getElementById('modalTitle').textContent = '✏️ Editar Memoria';
            document.getElementById('memoryContent').value = memory.content;
            document.getElementById('memoryCategory').value = memory.category;
            document.getElementById('memoryTags').value = memory.tags.join(', ');
            document.getElementById('modal').classList.add('active');
        }

        function copyMemory(id) {
            const memory = getMemories().find(m => m.id === id);
            if (!memory) return;
            
            if (navigator.clipboard) {
                navigator.clipboard.writeText(memory.content).then(() => {
                    alert('📋 Copiado al portapapeles');
                });
            } else {
                // Fallback
                const textarea = document.createElement('textarea');
                textarea.value = memory.content;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('📋 Copiado al portapapeles');
            }
        }

        function deleteMemory(id) {
            if (!confirm('¿Borrar este recuerdo?')) return;
            
            const memories = getMemories().filter(m => m.id !== id);
            saveMemories(memories);
            renderMemories();
        }

        function exportMemories() {
            const memories = getMemories();
            const dataStr = JSON.stringify(memories, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `memoria-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Cerrar modal al hacer click fuera
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });

        // Inicializar
        renderMemories();
    </script>
</body>
</html>
