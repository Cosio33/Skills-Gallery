<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Memoria</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 16px;
            min-height: 100vh;
        }
        .container { max-width: 700px; margin: 0 auto; }
        h2 { color: #00d4ff; margin-bottom: 20px; font-size: 20px; text-align: center; }
        .search-box {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #0f3460;
            border-radius: 8px;
            background: #16213e;
            color: white;
            margin-bottom: 16px;
            font-size: 16px;
        }
        .memory-card {
            background: #16213e;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid #00d4ff;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .memory-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .category {
            background: #0f3460;
            color: #00d4ff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            text-transform: uppercase;
        }
        .date { color: #888; font-size: 12px; }
        .content { 
            color: #fff; 
            line-height: 1.5; 
            margin-bottom: 8px;
            white-space: pre-wrap;
        }
        .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
        .tag {
            background: #e94560;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
        }
        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .btn-small {
            background: #0f3460;
            color: #00d4ff;
            border: 1px solid #00d4ff;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-small:hover { background: #00d4ff; color: #1a1a2e; }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        .stats {
            text-align: center;
            color: #888;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #00d4ff;
            color: #1a1a2e;
            border: none;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0,212,255,0.4);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #16213e;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal h3 { color: #00d4ff; margin-bottom: 16px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; color: #888; margin-bottom: 4px; font-size: 14px; }
        .input-group input, .input-group textarea, .input-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #0f3460;
            border-radius: 8px;
            background: #1a1a2e;
            color: white;
            font-size: 14px;
        }
        .input-group textarea { min-height: 100px; resize: vertical; }
        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-primary { background: #00d4ff; color: #1a1a2e; }
        .btn-secondary { background: #0f3460; color: #00d4ff; }
        .btn-danger { background: #e94560; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🧠 Mi Memoria</h2>
        <input type="text" class="search-box" id="searchInput" placeholder="🔍 Buscar en memorias...">
        <div class="stats" id="stats"></div>
        <div id="memoriesList"></div>
    </div>

    <button class="fab" onclick="openModal()">+</button>

    <!-- Modal para agregar/editar -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 id="modalTitle">📝 Nueva Memoria</h3>
            <div class="input-group">
                <label>Contenido</label>
                <textarea id="memoryContent" placeholder="Escribe lo que quieres recordar..."></textarea>
            </div>
            <div class="input-group">
                <label>Categoría</label>
                <select id="memoryCategory">
                    <option value="general">General</option>
                    <option value="preferencias">Preferencias</option>
                    <option value="proyectos">Proyectos</option>
                    <option value="recordatorios">Recordatorios</option>
                    <option value="personales">Personales</option>
                    <option value="trabajo">Trabajo</option>
                </select>
            </div>
            <div class="input-group">
                <label>Etiquetas (separadas por coma)</label>
                <input type="text" id="memoryTags" placeholder="ej: importante, urgente, idea">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="saveMemory()">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'ai_edge_gallery_long_term_memory';
        let editingId = null;

        function getMemories() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                return data ? JSON.parse(data) : [];
            } catch (e) { return []; }
        }

        function saveMemories(memories) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(memories));
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function formatDate(isoString) {
            const date = new Date(isoString);
            return date.toLocaleDateString('es-ES', { 
                day: '2-digit', month: 'short', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderMemories(memories = getMemories()) {
            const container = document.getElementById('memoriesList');
            const stats = document.getElementById('stats');
            
            stats.textContent = `${memories.length} recuerdo${memories.length !== 1 ? 's' : ''}`;

            if (memories.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>📝 No hay memorias guardadas</p>
                        <p style="margin-top: 10px; font-size: 14px;">
                            Presiona el botón + para agregar tu primera memoria
                        </p>
                    </div>
                `;
                return;
            }

            container.innerHTML = memories.map(m => `
                <div class="memory-card">
                    <div class="memory-header">
                        <span class="category">${m.category}</span>
                        <span class="date">${formatDate(m.createdAt)}</span>
                    </div>
                    <div class="content">${escapeHtml(m.content)}</div>
                    ${m.tags.length ? `
                        <div class="tags">
                            ${m.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
                        </div>
                    ` : ''}
                    <div class="card-actions">
                        <button class="btn-small" onclick="editMemory('${m.id}')">✏️ Editar</button>
                        <button class="btn-small" onclick="copyMemory('${m.id}')">📋 Copiar</button>
                        <button class="btn-small" onclick="deleteMemory('${m.id}')" style="color: #e94560; border-color: #e94560;">🗑️ Borrar</button>
                    </div>
                </div>
            `).join('');
        }

        function searchMemories(query) {
            const memories = getMemories();
            if (!query.trim()) return memories;
            
            const lowerQuery = query.toLowerCase();
            return memories.filter(m => 
                m.content.toLowerCase().includes(lowerQuery) ||
                m.category.toLowerCase().includes(lowerQuery) ||
                m.tags.some(t => t.toLowerCase().includes(lowerQuery))
            );
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderMemories(searchMemories(e.target.value));
        });

        function openModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = '📝 Nueva Memoria';
            document.getElementById('memoryContent').value = '';
            document.getElementById('memoryCategory').value = 'general';
            document.getElementById('memoryTags').value = '';
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function saveMemory() {
            const content = document.getElementById('memoryContent').value.trim();
            const category = document.getElementById('memoryCategory').value;
            const tagsStr = document.getElementById('memoryTags').value;
            
            if (!content) {
                alert('Por favor escribe algo para recordar');
                return;
            }

            const tags = tagsStr.split(',').map(t => t.trim()).filter(t => t);
            const memories = getMemories();

            if (editingId) {
                const index = memories.findIndex(m => m.id === editingId);
                if (index !== -1) {
                    memories[index] = {
                        ...memories[index],
                        content,
                        category,
                        tags,
                        updatedAt: new Date().toISOString()
                    };
                }
            } else {
                memories.unshift({
                    id: generateId(),
                    content,
                    category,
                    tags,
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                });
            }

            saveMemories(memories);
            closeModal();
            renderMemories();
        }

        function editMemory(id) {
            const memory = getMemories().find(m => m.id === id);
            if (!memory) return;

            editingId = id;
            document.getElementById('modalTitle').textContent = '✏️ Editar Memoria';
            document.getElementById('memoryContent').value = memory.content;
            document.getElementById('memoryCategory').value = memory.category;
            document.getElementById('memoryTags').value = memory.tags.join(', ');
            document.getElementById('modal').classList.add('active');
        }

        function copyMemory(id) {
            const memory = getMemories().find(m => m.id === id);
            if (!memory) return;
            
            navigator.clipboard.writeText(memory.content).then(() => {
                alert('📋 Copiado al portapapeles');
            });
        }

        function deleteMemory(id) {
            if (!confirm('¿Borrar este recuerdo?')) return;
            
            const memories = getMemories().filter(m => m.id !== id);
            saveMemories(memories);
            renderMemories();
        }

        // Cerrar modal al hacer click fuera
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });

        // Inicializar
        renderMemories();
    </script>
</body>
</html>
