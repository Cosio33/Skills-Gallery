<!DOCTYPE html>
<html>
<head><script>
// La función que la IA de AI Edge Gallery llamará para obtener el resultado
window.ai_edge_gallery_get_result = async () => {
  let salida = "";
  const keyPersonalidad = "personalidad_asistente";

  // --- 1. Intentar cargar personalidad guardada ---
  const personalidadGuardada = localStorage.getItem(keyPersonalidad);
  if (personalidadGuardada) {
    salida = `[SISTEMA: Memoria encontrada.]\n\n--- PERSONALIDAD GUARDADA ---\n${personalidadGuardada}\n--- FIN ---\n\n`;
  } else {
    salida = "[SISTEMA: Primera vez. Inicializando personalidad...]\n\n";
  }

  // --- 2. Construir instrucciones para el LLM ---
  const instruccionGeneral = `Eres un asistente experto en tecnología Android. ... `;

  // --- 3. Dar la instrucción final al LLM ---
  return salida + instruccionGeneral;
};
</script></head><body></body>
</html>
