<!DOCTYPE html>
<html>
<head>
    <script>
        window.ai_edge_gallery_get_result = async () => {
            return `[Las instrucciones para el LLM se mantienen igual...]`;
        };

        // Esta es la nueva función principal
        async function crearYEstructurarSkill(nombre, descripcion, contenidoMd, tipo, contenidoHtml = "") {
            // 1. Crear el archivo ZIP en memoria
            const zipContent = await crearZipEnMemoria(nombre, contenidoMd, tipo, contenidoHtml);
            
            // 2. Crear un enlace de descarga
            const blob = new Blob([zipContent], { type: "application/zip" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `${nombre}.zip`;
            
            // 3. Simular un clic para iniciar la descarga
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            // 4. Limpiar el objeto URL
            URL.revokeObjectURL(url);
            
            return `✅ Skill "${nombre}" generada. Revisa tu carpeta de Descargas.`;
        }

        // Función auxiliar para crear el ZIP en memoria
        async function crearZipEnMemoria(nombre, contenidoMd, tipo, contenidoHtml) {
            // Esta es una implementación simplificada.
            // Para un ZIP real, necesitarías una librería.
            // Como no podemos usar librerías externas, crearemos un texto instructivo.
            let zipContenido = `=== SKILL GENERADA: ${nombre} ===\n\n`;
            zipContenido += `SKILL.md:\n${contenidoMd}\n\n`;
            if (tipo === "javascript" && contenidoHtml) {
                zipContenido += `scripts/index.html:\n${contenidoHtml}\n\n`;
            }
            zipContenido += `Instrucciones: Crea una carpeta con el nombre "${nombre}", guarda SKILL.md dentro.`;
            return zipContenido;
        }

        window.crearSkill = async (nombre, descripcion, contenidoMd, tipo, contenidoHtml) => {
            return await crearYEstructurarSkill(nombre, descripcion, contenidoMd, tipo, contenidoHtml);
        };
    </script>
</head>
<body></body>
</html>
